# Development override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Changes:
#   • Frontend runs `next dev` (hot-reload) with source mounted as a volume
#   • Backend runs uvicorn with --reload so Python changes apply instantly
#   • No rebuild needed for code changes in either service

services:
  backend:
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      - /app/uploads
      - /app/reports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
