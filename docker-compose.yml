version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-firmyx}
      POSTGRES_USER: ${POSTGRES_USER:-firmyx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-firmyx_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - firmyx_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firmyx"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - firmyx_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-firmyx}:${POSTGRES_PASSWORD:-firmyx_dev_password}@db:5432/${POSTGRES_DB:-firmyx}
      - REDIS_URL=redis://redis:6379/0
    command: sh -c "alembic upgrade head && gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/reports:/app/reports
    networks:
      - firmyx_network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    networks:
      - firmyx_network

networks:
  firmyx_network:
    driver: bridge

volumes:
  postgres_data:
