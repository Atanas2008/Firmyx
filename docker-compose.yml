version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: firmshield
      POSTGRES_USER: firmshield
      POSTGRES_PASSWORD: firmshield_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - firmshield_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firmshield"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://firmshield:firmshield_dev_password@db:5432/firmshield
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/reports:/app/reports
    networks:
      - firmshield_network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    networks:
      - firmshield_network

networks:
  firmshield_network:
    driver: bridge

volumes:
  postgres_data:
